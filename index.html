<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Milimar Vault · Simple</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        button { background: #fbbf24; color: #0f172a; border: none; padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 8px; border: 1px solid #475569; background: #334155; color: white; width: 100%; margin: 5px 0; }
        .error { color: #f87171; }
        .success { color: #4ade80; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
    <h1>Milimar Vault</h1>
    <p>Contrato: 0xe13D5B2566EBcDc460Bc192b85506EA0Cfb0E92E</p>
    <div id="status">Desconectado</div>
    <button id="connect">Conectar</button>
    <hr>
    <div id="data"></div>
    <hr>
    <h3>Depositar automático</h3>
    <input type="number" id="amount" placeholder="Cantidad (mín 10)" min="10" step="0.01">
    <button id="deposit">Depositar</button>
    <h3>Retirar</h3>
    <input type="number" id="shares" placeholder="Cantidad de shares" step="1">
    <button id="withdraw">Retirar</button>
    <h3>Reclamar recompensas</h3>
    <button id="claim">Reclamar</button>
    <div id="msg"></div>

    <script>
        const CONTRACT_ADDRESS = "0xe13D5B2566EBcDc460Bc192b85506EA0Cfb0E92E";
        const ABI = [
            "function totalShares() view returns (uint256)",
            "function totalActivos() view returns (uint256)",
            "function precioShare() view returns (uint256)",
            "function shares(address) view returns (uint256)",
            "function saldoDe(address) view returns (uint256)",
            "function recompensasPendientesReferidor(address) view returns (uint256)",
            "function depositarAuto(uint256) external",
            "function retirar(uint256) external",
            "function reclamarRecompensas() external"
        ];

        let provider, signer, contract, userAddress;

        const connectBtn = document.getElementById('connect');
        const statusDiv = document.getElementById('status');
        const dataDiv = document.getElementById('data');
        const msgDiv = document.getElementById('msg');

        function log(msg, isError = false) {
            msgDiv.innerHTML = `<p class="${isError ? 'error' : 'success'}">${msg}</p>`;
        }

        connectBtn.onclick = async () => {
            if (!window.ethereum) return alert('Instala MetaMask');
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();
                statusDiv.innerHTML = `Conectado: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                await loadData();
            } catch (e) {
                log('Error: ' + e.message, true);
            }
        };

        async function loadData() {
            try {
                const totalShares = await contract.totalShares();
                const totalActivos = await contract.totalActivos();
                const precioShare = await contract.precioShare();
                const misShares = await contract.shares(userAddress);
                const miSaldo = await contract.saldoDe(userAddress);
                const recompensas = await contract.recompensasPendientesReferidor(userAddress);
                dataDiv.innerHTML = `
                    <p>Total Shares: ${ethers.utils.formatUnits(totalShares, 18)}</p>
                    <p>Total Activos: ${ethers.utils.formatUnits(totalActivos, 18)} USDT</p>
                    <p>Precio Share: ${ethers.utils.formatUnits(precioShare, 18)}</p>
                    <p>Mis Shares: ${ethers.utils.formatUnits(misShares, 18)}</p>
                    <p>Mi Saldo: ${ethers.utils.formatUnits(miSaldo, 18)} USDT</p>
                    <p>Recompensas: ${ethers.utils.formatUnits(recompensas, 18)} USDT</p>
                `;
            } catch (e) {
                log('Error al cargar datos: ' + e.message, true);
            }
        }

        document.getElementById('deposit').onclick = async () => {
            const amount = document.getElementById('amount').value;
            if (!amount || amount < 10) return log('Mínimo 10 USDT', true);
            try {
                const tx = await contract.depositarAuto(ethers.utils.parseUnits(amount, 18));
                log('Transacción enviada, esperando...');
                await tx.wait();
                log('Depósito exitoso');
                await loadData();
            } catch (e) {
                log('Error: ' + e.message, true);
            }
        };

        document.getElementById('withdraw').onclick = async () => {
            const shares = document.getElementById('shares').value;
            if (!shares || shares <= 0) return log('Cantidad inválida', true);
            try {
                const tx = await contract.retirar(ethers.utils.parseUnits(shares, 18));
                log('Transacción enviada...');
                await tx.wait();
                log('Retiro exitoso');
                await loadData();
            } catch (e) {
                log('Error: ' + e.message, true);
            }
        };

        document.getElementById('claim').onclick = async () => {
            try {
                const tx = await contract.reclamarRecompensas();
                log('Reclamando...');
                await tx.wait();
                log('Recompensas reclamadas');
                await loadData();
            } catch (e) {
                log('Error: ' + e.message, true);
            }
        };
    </script>
</body>
</html>
