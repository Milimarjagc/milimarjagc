<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Milimar Vault - Testnet (simplificado)</title>
    <!-- mismo estilo que antes, lo omito por brevedad -->
</head>
<body>
    <!-- mismo HTML que antes -->
    <script>
        const CONFIG = {
            vaultAddress: "0x09b3A8338471718e25b19E37d0669FfdE250CD37",
            usdtAddress: "0x337610d27c682e347c9cd60bd4b3b107c9d34d",
            chainId: 97
        };

        // ABI mínimo con funciones individuales
        const VAULT_ABI = [
            "function totalAssets() view returns (uint256)",
            "function totalShares() view returns (uint256)",
            "function sharePrice() view returns (uint256)",
            "function shares(address) view returns (uint256)",
            "function balanceOf(address) view returns (uint256)",
            "function emergencyMode() view returns (bool)",
            "function deposit(uint256 _amount) returns (bool)",
            "function emergencyWithdraw()"
        ];

        const USDT_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function approve(address spender, uint256 amount) returns (bool)"
        ];

        // Variables y funciones de conexión (igual que antes)

        async function loadVaultData() {
            try {
                // Llamadas individuales con manejo de errores
                let totalAssets = 0, totalShares = 0, sharePrice = 1e18, emergency = false;
                try { totalAssets = await vaultContract.totalAssets(); } catch (e) { console.warn("totalAssets falló", e); }
                try { totalShares = await vaultContract.totalShares(); } catch (e) { console.warn("totalShares falló", e); }
                try { sharePrice = await vaultContract.sharePrice(); } catch (e) { console.warn("sharePrice falló", e); }
                try { emergency = await vaultContract.emergencyMode(); } catch (e) { console.warn("emergencyMode falló", e); }

                totalAssetsEl.textContent = formatUnits(totalAssets) + ' USDT';
                totalSharesEl.textContent = formatUnits(totalShares, 18);
                sharePriceEl.textContent = formatUnits(sharePrice);

                // Datos del usuario
                const shares = await vaultContract.shares(userAddress);
                const balance = await vaultContract.balanceOf(userAddress);
                mySharesEl.textContent = formatUnits(shares, 18);
                myBalanceEl.textContent = formatUnits(balance) + ' USDT';

                const usdtBal = await usdtContract.balanceOf(userAddress);
                usdtBalanceEl.textContent = formatUnits(usdtBal) + ' USDT';

                emergencyWithdrawBtn.disabled = !emergency;
            } catch (error) {
                showMessage('Error cargando datos: ' + error.message, 'error');
            }
        }

        // Resto del código (connect, approve, deposit, etc.) igual que antes
    </script>
</body>
</html>
